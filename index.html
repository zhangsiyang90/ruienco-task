  <script>class _SQ{constructor(u,k,t){this.u=u;this.k=k;this.t=t;this.f=[];this.s='*';this.l=null;this.o=null;this.sg=false;this.m='GET';this.b=null;this.sc=false;}select(s){this.s=s;this.sc=true;return this;}eq(c,v){this.f.push(c+'=eq.'+encodeURIComponent(v));return this;}limit(n){this.l=n;return this;}order(c,{ascending:a=true}={}){this.o=c+'.'+(a?'asc':'desc');return this;}single(){this.sg=true;return this;}insert(d){this.m='POST';this.b=JSON.stringify(Array.isArray(d)?d:[d]);return this;}update(d){this.m='PATCH';this.b=JSON.stringify(d);return this;}delete(){this.m='DELETE';return this;}then(res){let ep=this.u+'/rest/v1/'+this.t,p=[];if(this.m==='GET'){p.push('select='+this.s);this.f.forEach(f=>p.push(f));if(this.l)p.push('limit='+this.l);if(this.o)p.push('order='+this.o);}else{this.f.forEach(f=>p.push(f));if(this.sc)p.push('select='+this.s);}if(p.length)ep+='?'+p.join('&');const h={'apikey':this.k,'Authorization':'Bearer '+this.k,'Content-Type':'application/json'};if(this.sg)h['Accept']='application/vnd.pgrst.object+json';if(this.m==='POST'||this.m==='PATCH')h['Prefer']=this.sc||this.sg?'return=representation':'return=minimal';fetch(ep,{method:this.m,headers:h,body:this.b}).then(r=>r.status===204?null:r.json()).then(d=>{if(!d)return res({data:null,error:null});if(d.code&&d.message)return res({data:null,error:d});res({data:this.sg?(Array.isArray(d)?d[0]:d):d,error:null});}).catch(e=>res({data:null,error:e}));}}window.supabase={createClient:(u,k)=>({from:t=>new _SQ(u,k,t)})};</script>

    :root {
      --primary: #8B5CF6;
      --bg: #F8F5F0;
    }
    body { background-color: var(--bg); }
    .sidebar { background: linear-gradient(180deg, #1e1b4b 0%, #312e81 100%); }
    .nav-item { transition: all 0.2s; }
    .nav-item:hover, .nav-item.active { background: rgba(139,92,246,0.3); }
    .card-shadow { box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    .badge-daily { background: #74B9FF; color: #fff; }
    .badge-weekly { background: #00B894; color: #fff; }
    .badge-monthly { background: #FD79A8; color: #fff; }

    .priority-medium { color: #FDCB6E; }

    .task-card { transition: transform 0.15s, box-shadow 0.15s; }
    .task-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.12); }
    input:focus, select:focus, textarea:focus { outline: none; border-color: #8B5CF6 !important; box-shadow: 0 0 0 3px rgba(139,92,246,0.15); }
    .btn-primary { background: #8B5CF6; color: #fff; transition: background 0.2s; }
    .btn-primary:hover { background: #7C3AED; }
    .btn-danger { background: #EF4444; color: #fff; transition: background 0.2s; }
    .btn-danger:hover { background: #DC2626; }
    .btn-success { background: #10B981; color: #fff; transition: background 0.2s; }
    .btn-success:hover { background: #059669; }
    .stat-card { transition: transform 0.2s; }
    .stat-card:hover { transform: translateY(-3px); }
  </style>
</head>

<!-- ======= MODALS ======= -->
<!-- Task Detail Modal -->
<div id="taskDetailModal" class="hidden fixed inset-0 z-50 flex items-center justify-center modal-overlay p-4">
  <div class="bg-white rounded-2xl w-full max-w-lg card-shadow overflow-hidden">
    <div class="flex items-center justify-between p-5 border-b">
      <h3 class="font-bold text-gray-800 text-lg">任务详情</h3>
      <button onclick="closeModal('taskDetailModal')" class="text-gray-400 hover:text-gray-600 text-xl">&times;</button>
    </div>
    <div id="taskDetailContent" class="p-5 space-y-3 max-h-96 overflow-y-auto scrollbar-thin text-sm text-gray-700"></div>
    <div class="p-4 border-t flex justify-end">
      <button onclick="closeModal('taskDetailModal')" class="px-4 py-2 text-gray-500 hover:text-gray-700">关闭</button>
    </div>
  </div>
</div>

<!-- Submit Output Modal -->
<div id="submitOutputModal" class="hidden fixed inset-0 z-50 flex items-center justify-center modal-overlay p-4">
  <div class="bg-white rounded-2xl w-full max-w-lg card-shadow overflow-hidden">
    <div class="flex items-center justify-between p-5 border-b">
      <h3 class="font-bold text-gray-800 text-lg">提交成果</h3>
      <button onclick="closeModal('submitOutputModal')" class="text-gray-400 hover:text-gray-600 text-xl">&times;</button>
    </div>
    <div class="p-5 space-y-4">
      <div id="videoLinksList" class="space-y-2">
        <div class="flex items-center gap-2 mb-1">
          <span class="text-sm font-medium text-gray-700">视频链接列表</span>
          <button onclick="addVideoLinkRow()" class="text-xs btn-primary px-2 py-0.5 rounded-full">+ 添加</button>
        </div>
        <div id="videoLinksContainer"></div>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">备注说明</label>
        <textarea id="outputNotes" rows="3" placeholder="填写备注说明..." 
          class="w-full border border-gray-200 rounded-lg p-2.5 text-sm resize-none"></textarea>
      </div>
      <div id="submitOutputError" class="hidden text-red-500 text-xs bg-red-50 p-2 rounded"></div>
    </div>
    <div class="p-4 border-t flex justify-end gap-2">
      <button onclick="closeModal('submitOutputModal')" class="px-4 py-2 text-gray-500 hover:text-gray-700 text-sm">取消</button>
      <button onclick="submitOutput()" id="submitOutputBtn" class="btn-primary px-5 py-2 rounded-lg text-sm font-medium">提交成果</button>
    </div>
  </div>
</div>

<!-- Review Modal -->
<div id="reviewModal" class="hidden fixed inset-0 z-50 flex items-center justify-center modal-overlay p-4">
  <div class="bg-white rounded-2xl w-full max-w-xl card-shadow overflow-hidden">
    <div class="flex items-center justify-between p-5 border-b">
      <h3 class="font-bold text-gray-800 text-lg">审核任务</h3>
      <button onclick="closeModal('reviewModal')" class="text-gray-400 hover:text-gray-600 text-xl">&times;</button>
    </div>
    <div id="reviewModalContent" class="p-5 space-y-4 max-h-[70vh] overflow-y-auto scrollbar-thin"></div>
    <div class="p-4 border-t">
      <div class="mb-3">
        <label class="block text-sm font-medium text-gray-700 mb-1">审核意见</label>
        <textarea id="reviewComments" rows="2" placeholder="填写审核意见（驳回时必填）..." 
          class="w-full border border-gray-200 rounded-lg p-2.5 text-sm resize-none"></textarea>
      </div>
      <div class="flex justify-end gap-2">
        <button onclick="closeModal('reviewModal')" class="px-4 py-2 text-gray-500 hover:text-gray-700 text-sm">取消</button>
        <button onclick="doReview('rejected')" class="btn-danger px-4 py-2 rounded-lg text-sm font-medium">
          <i class="fa fa-times mr-1"></i>驳回
        </button>
        <button onclick="doReview('completed')" class="btn-success px-4 py-2 rounded-lg text-sm font-medium">
          <i class="fa fa-check mr-1"></i>通过
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Add User Modal -->
<div id="addUserModal" class="hidden fixed inset-0 z-50 flex items-center justify-center modal-overlay p-4">
  <div class="bg-white rounded-2xl w-full max-w-sm card-shadow overflow-hidden">

function showToast(msg, type = 'success') {

function closeModal(id) {
  document.getElementById(id).classList.add('hidden');

function formatDate(str) {
  if (!str) return '-';
  const d = new Date(str);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function isOverdue(deadline) {
  if (!deadline) return false;
  return new Date(deadline) < new Date();
}

function taskTypeBadge(type) {
  const map = { daily: ['badge-daily','日'], weekly: ['badge-weekly','周'], monthly: ['badge-monthly','月'] };
  const [cls, label] = map[type] || ['bg-gray-200 text-gray-700','?'];
  return `<span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-semibold ${cls}">${label}任务</span>`;
}

function priorityIcon(p) {
  const map = { low: ['priority-low','fa-arrow-down'], medium: ['priority-medium','fa-minus'], high: ['priority-high','fa-arrow-up'] };
  const [cls, icon] = map[p] || ['text-gray-400','fa-minus'];
  return `<i class="fa ${icon} ${cls}"></i>`;
}

function statusLabel(s) {
  const map = {
    pending: ['bg-gray-100 text-gray-600','待认领'],
    inProgress: ['bg-blue-100 text-blue-700','进行中'],
    reviewing: ['bg-yellow-100 text-yellow-700','待审核'],
    completed: ['bg-green-100 text-green-700','已完成'],
    rejected: ['bg-red-100 text-red-700','已驳回']
  };
  const [cls, label] = map[s] || ['bg-gray-100 text-gray-600', s];
  return `<span class="px-2 py-0.5 rounded-full text-xs font-medium ${cls}">${label}</span>`;
}

async function renderStats() {
  const { data: tasks } = await supabase.from('slice_tasks').select('*');

  const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const weekStart = new Date(todayStart); weekStart.setDate(todayStart.getDate() - todayStart.getDay());
  const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);

  const todayTasks = tasks.filter(t => new Date(t.created_at) >= todayStart);
  const weekTasks = tasks.filter(t => new Date(t.created_at) >= weekStart);
  const monthTasks = tasks.filter(t => new Date(t.created_at) >= monthStart);
  const overdue = tasks.filter(t => isOverdue(t.deadline) && !['completed','rejected'].includes(t.status));

  // workload

  tasks.filter(t => t.assignee_id).forEach(t => {
    if (!workload[t.assignee_id]) workload[t.assignee_id] = { total: 0, completed: 0 };

    if (t.status === 'completed') workload[t.assignee_id].completed++;

    const count = tasks.filter(t => t.status === 'completed' && new Date(t.created_at) >= d && new Date(t.created_at) < next).length;
    last7.push(count);
    last7Labels.push(`${d.getMonth()+1}/${d.getDate()}`);

    daily: tasks.filter(t => t.task_type === 'daily').length,

        <div class="stat-card bg-white rounded-xl p-5 card-shadow">
          <div class="flex items-center justify-between mb-3">
            <div class="w-10 h-10 rounded-lg bg-purple-50 flex items-center justify-center">
              <i class="fa fa-calendar-o text-purple-500 text-lg"></i>
            </div>
            <span class="text-xs text-gray-400">本月</span>
          </div>
          <div class="text-3xl font-bold text-gray-800">${monthTasks.length}</div>
          <div class="text-xs text-gray-500 mt-1">本月任务总数</div>
        </div>
        <div class="stat-card bg-white rounded-xl p-5 card-shadow">
          <div class="flex items-center justify-between mb-3">
            <div class="w-10 h-10 rounded-lg bg-red-50 flex items-center justify-center">

      <!-- Charts -->

          <h3 class="font-semibold text-gray-700 mb-4 text-sm">近7天完成趋势</h3>
          <canvas id="lineChart" height="180"></canvas>
        </div>
        <div class="bg-white rounded-xl p-5 card-shadow">
          <h3 class="font-semibold text-gray-700 mb-4 text-sm">任务类型分布</h3>
          <canvas id="pieChart" height="180"></canvas>

async function renderKanban() {
  const { data: tasks } = await supabase.from('slice_tasks').select('*').order('created_at', { ascending: false });

  document.getElementById('pageContent').innerHTML = `
    <div class="space-y-4">
      <!-- Filters -->
      <div class="bg-white rounded-xl p-4 card-shadow flex flex-wrap items-center gap-3">
        <div class="flex items-center gap-2">
          <label class="text-sm text-gray-500">状态：</label>
          <select id="filterStatus" onchange="applyKanbanFilters()" class="border border-gray-200 rounded-lg px-3 py-1.5 text-sm">
            <option value="">全部</option>
            <option value="pending">待认领</option>
            <option value="inProgress">进行中</option>
            <option value="reviewing">待审核</option>
            <option value="completed">已完成</option>
            <option value="rejected">已驳回</option>
          </select>
        </div>
        <div class="flex items-center gap-2">
          <label class="text-sm text-gray-500">类型：</label>
          <select id="filterType" onchange="applyKanbanFilters()" class="border border-gray-200 rounded-lg px-3 py-1.5 text-sm">
            <option value="">全部</option>
            <option value="daily">日任务</option>
            <option value="weekly">周任务</option>
            <option value="monthly">月任务</option>
          </select>
        </div>
        <div class="ml-auto text-xs text-gray-400">共 ${tasks ? tasks.length : 0} 个任务</div>
      </div>
      <!-- Board -->
      <div class="grid grid-cols-5 gap-3" id="kanbanBoard">
      </div>
    </div>
  `;

  window._kanbanTasks = tasks || [];
  applyKanbanFilters();
}

function applyKanbanFilters() {
  const statusFilter = document.getElementById('filterStatus')?.value || '';
  const typeFilter = document.getElementById('filterType')?.value || '';
  let tasks = window._kanbanTasks || [];

  if (statusFilter) tasks = tasks.filter(t => t.status === statusFilter);
  if (typeFilter) tasks = tasks.filter(t => t.task_type === typeFilter);

  renderKanbanBoard(tasks);
}

function renderKanbanBoard(tasks) {
  const cols = [
    { key: 'pending', label: '待认领', color: 'bg-gray-100', header: 'bg-gray-500' },
    { key: 'inProgress', label: '进行中', color: 'bg-blue-50', header: 'bg-blue-500' },
    { key: 'reviewing', label: '待审核', color: 'bg-yellow-50', header: 'bg-yellow-500' },
    { key: 'completed', label: '已完成', color: 'bg-green-50', header: 'bg-green-500' },
    { key: 'rejected', label: '已驳回', color: 'bg-red-50', header: 'bg-red-500' }
  ];

  const board = document.getElementById('kanbanBoard');
  board.innerHTML = cols.map(col => {
    const colTasks = tasks.filter(t => t.status === col.key);
    return `
      <div class="kanban-col ${col.color} rounded-xl overflow-hidden">
        <div class="${col.header} text-white px-4 py-2.5 flex items-center justify-between">
          <span class="font-semibold text-sm">${col.label}</span>
          <span class="bg-white/20 text-white text-xs px-2 py-0.5 rounded-full">${colTasks.length}</span>
        </div>
        <div class="p-2 space-y-2 max-h-[65vh] overflow-y-auto scrollbar-thin">
          ${colTasks.length === 0 ? '<div class="text-center text-gray-400 text-xs py-6">暂无任务</div>' : 
            colTasks.map(t => renderTaskCard(t, col.key)).join('')}
        </div>
      </div>
    `;
  }).join('');
}

function renderTaskCard(task, colKey) {
  const publisher = allUsers[task.publisher_id];
  const assignee = task.assignee_id ? allUsers[task.assignee_id] : null;
  const overdue = isOverdue(task.deadline) && !['completed', 'rejected'].includes(task.status);

  return `
    <div class="task-card bg-white rounded-xl p-3 cursor-pointer card-shadow">
      <div class="flex items-center justify-between mb-2">
        ${taskTypeBadge(task.task_type)}
        <span class="flex items-center gap-1 text-xs text-gray-500">
          ${priorityIcon(task.priority)}
          <span class="capitalize">${task.priority === 'high' ? '高' : task.priority === 'medium' ? '中' : '低'}</span>
        </span>
      </div>
      <div class="font-medium text-gray-800 text-sm mb-2 line-clamp-2">${task.title}</div>
      <div class="text-xs text-gray-500 space-y-1">
        <div class="flex items-center gap-1">
          <i class="fa fa-user-o w-3"></i>
          <span>发布：${publisher ? publisher.name : '未知'}</span>
        </div>
        ${assignee ? `<div class="flex items-center gap-1"><i class="fa fa-user w-3 text-purple-400"></i><span>认领：${assignee.name}</span></div>` : ''}
        <div class="flex items-center gap-1 ${overdue ? 'text-red-500' : ''}">
          <i class="fa fa-clock-o w-3"></i>
          <span>${overdue ? '⚠ 逾期：' : ''}${formatDate(task.deadline)}</span>
        </div>
      </div>
      <div class="mt-3">
        ${colKey === 'pending' ? 
          `<button onclick="claimTask('${task.id}')" class="w-full btn-primary text-xs py-1.5 rounded-lg font-medium">
            <i class="fa fa-hand-o-right mr-1"></i>认领任务
          </button>` :

async function renderMyTasks() {

    .from('slice_tasks')
    .select('*')
    .eq('assignee_id', currentUser.id)
    .order('created_at', { ascending: false });

  if (!tasks || tasks.length === 0) {

        <i class="fa fa-inbox text-gray-300 text-5xl mb-4"></i>
        <p class="text-gray-400">你还没有任何任务，快去认领吧！</p>
        <button onclick="navigateTo('kanban')" class="mt-4 btn-primary px-5 py-2 rounded-lg text-sm font-medium">去任务管理</button>
      </div>
    `;
    return;
  }

  const statusGroups = {
    inProgress: tasks.filter(t => t.status === 'inProgress'),
    reviewing: tasks.filter(t => t.status === 'reviewing'),
    completed: tasks.filter(t => t.status === 'completed'),
    rejected: tasks.filter(t => t.status === 'rejected'),
    pending: tasks.filter(t => t.status === 'pending')
  };

  const renderGroup = (label, groupTasks, colorClass) => {
    if (groupTasks.length === 0) return '';
    return `
      <div>
        <h3 class="font-semibold text-gray-700 text-sm mb-3 flex items-center gap-2">
          <span class="w-2 h-2 rounded-full ${colorClass}"></span>
          ${label} (${groupTasks.length})

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
          ${groupTasks.map(t => renderMyTaskCard(t)).join('')}
        </div>
      </div>

  document.getElementById('pageContent').innerHTML = `
    <div class="space-y-6">
      ${renderGroup('进行中', statusGroups.inProgress, 'bg-blue-500')}
      ${renderGroup('已驳回', statusGroups.rejected, 'bg-red-500')}
      ${renderGroup('待审核', statusGroups.reviewing, 'bg-yellow-500')}
      ${renderGroup('已完成', statusGroups.completed, 'bg-green-500')}
      ${renderGroup('待认领', statusGroups.pending, 'bg-gray-400')}
    </div>
  `;
}

  const canSubmit = task.status === 'inProgress' || task.status === 'rejected';

  return `
    <div class="bg-white rounded-xl p-4 card-shadow task-card">
      <div class="flex items-center justify-between mb-3">

      <div class="space-y-1 text-xs text-gray-500 mb-3">
        <div class="flex items-center gap-2">
          ${priorityIcon(task.priority)}
          <span>${task.priority === 'high' ? '高优先级' : task.priority === 'medium' ? '中优先级' : '低优先级'}</span>
        </div>
        <div class="flex items-center gap-2">
          <i class="fa fa-user-o w-3"></i>
          <span>发布：${publisher ? publisher.name : '未知'}</span>
        </div>
        <div class="flex items-center gap-2 ${overdue ? 'text-red-500' : ''}">

      </div>

        `<div class="bg-red-50 text-red-600 text-xs p-2 rounded-lg mb-2">

        </div>` : ''}
      <div class="flex gap-2">
        <button onclick="showTaskDetail('${task.id}')" class="flex-1 border border-gray-200 text-gray-600 hover:bg-gray-50 text-xs py-1.5 rounded-lg transition-colors">
          <i class="fa fa-eye mr-1"></i>详情
        </button>
        ${canSubmit ? `<button onclick="openSubmitModal('${task.id}')" class="flex-1 btn-primary text-xs py-1.5 rounded-lg font-medium">

function openSubmitModal(taskId) {
  currentSubmitTaskId = taskId;
  document.getElementById('outputNotes').value = '';
  document.getElementById('submitOutputError').classList.add('hidden');
  document.getElementById('videoLinksContainer').innerHTML = '';
  addVideoLinkRow();
  document.getElementById('submitOutputModal').classList.remove('hidden');
}

function addVideoLinkRow() {
  const container = document.getElementById('videoLinksContainer');
  const idx = container.children.length;
  const row = document.createElement('div');
  row.className = 'flex items-center gap-2 mb-2';
  row.innerHTML = `
    <input type="text" placeholder="链接名称" class="flex-1 border border-gray-200 rounded-lg p-2 text-xs" data-idx="${idx}" data-field="name" />
    <input type="url" placeholder="https://..." class="flex-2 border border-gray-200 rounded-lg p-2 text-xs w-48" data-idx="${idx}" data-field="url" />
    <button onclick="this.parentElement.remove()" class="text-red-400 hover:text-red-600 text-xs px-1">
      <i class="fa fa-trash"></i>
    </button>
  `;
  container.appendChild(row);
}

async function submitOutput() {
  const container = document.getElementById('videoLinksContainer');
  const rows = container.querySelectorAll('div');
  const videoLinks = [];

  rows.forEach(row => {
    const nameInput = row.querySelector('[data-field="name"]');
    const urlInput = row.querySelector('[data-field="url"]');
    if (nameInput && urlInput && urlInput.value.trim()) {
      videoLinks.push({ name: nameInput.value.trim() || urlInput.value.trim(), url: urlInput.value.trim() });
    }
  });

  if (videoLinks.length === 0) {
    document.getElementById('submitOutputError').textContent = '请至少填写一个视频链接';
    document.getElementById('submitOutputError').classList.remove('hidden');
    return;
  }

  const notes = document.getElementById('outputNotes').value.trim();
  const btn = document.getElementById('submitOutputBtn');
  btn.disabled = true;
  btn.innerHTML = '<i class="fa fa-spinner fa-spin mr-1"></i>提交中...';

  const { error: outErr } = await supabase.from('slice_outputs').insert({
    task_id: currentSubmitTaskId,
    uploader_id: currentUser.id,
    video_links: videoLinks,
    notes: notes,
    review_status: 'pending'
  });

  if (outErr) {
    document.getElementById('submitOutputError').textContent = '提交失败：' + outErr.message;
    document.getElementById('submitOutputError').classList.remove('hidden');
    btn.disabled = false;
    btn.innerHTML = '提交成果';
    return;
  }

  const { error: taskErr } = await supabase
    .from('slice_tasks')
    .update({ status: 'reviewing' })
    .eq('id', currentSubmitTaskId);

  if (taskErr) {
    showToast('成果已提交但状态更新失败', 'error');
  } else {
    showToast('提交成功！等待审核');
  }

  closeModal('submitOutputModal');
  btn.disabled = false;
  btn.innerHTML = '提交成果';
  renderMyTasks();
}

async function doPublishTask(e) {
  e.preventDefault();
  const title = document.getElementById('pubTitle').value.trim();
  const type = document.getElementById('pubType').value;
  const priority = document.getElementById('pubPriority').value;
  const videoUrl = document.getElementById('pubVideoUrl').value.trim();
  const sliceCount = document.getElementById('pubSliceCount').value;
  const deadline = document.getElementById('pubDeadline').value;
  const deliveryStandard = document.getElementById('pubDeliveryStandard').value.trim();
  const assigneeId = document.getElementById('pubAssignee').value;

  const btn = document.getElementById('publishBtn');
  btn.disabled = true;
  btn.innerHTML = '<i class="fa fa-spinner fa-spin mr-2"></i>发布中...';

  const payload = {
    title,
    task_type: type,
    priority,
    video_url: videoUrl || null,
    slice_count: sliceCount ? parseInt(sliceCount) : null,
    deadline: deadline ? new Date(deadline).toISOString() : null,
    delivery_standard: deliveryStandard || null,
    publisher_id: currentUser.id,
    assignee_id: assigneeId || null,
    status: assigneeId ? 'inProgress' : 'pending'
  };

  const { error } = await supabase.from('slice_tasks').insert(payload);

  if (error) {
    document.getElementById('publishError').textContent = '发布失败：' + error.message;
    document.getElementById('publishError').classList.remove('hidden');
    btn.disabled = false;
    btn.innerHTML = '<i class="fa fa-paper-plane mr-2"></i>发布任务';
    return;
  }

  showToast('任务发布成功！');
  btn.disabled = false;
  btn.innerHTML = '<i class="fa fa-paper-plane mr-2"></i>发布任务';
  e.target.reset();
  navigateTo('kanban');
}

async function doReview(action) {
  const comments = document.getElementById('reviewComments').value.trim();

  if (action === 'rejected' && !comments) {
    showToast('驳回时请填写审核意见', 'error');
    return;

  const { error } = await supabase
    .from('slice_tasks')
    .update({
      status: action,
      review_comments: comments || null
    })
    .eq('id', currentReviewTaskId);

  if (error) { showToast('操作失败：' + error.message, 'error'); return; }

  // also update the latest output's review_status
  const { data: outputs } = await supabase
    .from('slice_outputs')
    .select('id')
    .eq('task_id', currentReviewTaskId)
    .order('created_at', { ascending: false })
    .limit(1);

  if (outputs && outputs.length > 0) {
    await supabase
      .from('slice_outputs')
      .update({
        review_status: action === 'completed' ? 'approved' : 'rejected',
        review_comments: comments || null
      })
      .eq('id', outputs[0].id);
  }

  showToast(action === 'completed' ? '✅ 审核通过！' : '❌ 已驳回任务');
  closeModal('reviewModal');
  renderReview();
}

// ============ SETTINGS PAGE ============
async function renderSettings() {
  const { data: users } = await supabase.from('slice_users').select('*').order('created_at');

  document.getElementById('pageContent').innerHTML = `
    <div class="max-w-2xl mx-auto space-y-4">
      <div class="bg-white rounded-2xl card-shadow overflow-hidden">
        <div class="flex items-center justify-between p-5 border-b">
          <h3 class="font-bold text-gray-800 flex items-center gap-2">
            <i class="fa fa-users text-purple-500"></i>用户管理
          </h3>
          <button onclick="document.getElementById('addUserModal').classList.remove('hidden')" 
            class="btn-primary px-4 py-2 rounded-lg text-sm font-medium">
            <i class="fa fa-plus mr-1"></i>添加用户
          </button>
        </div>
        <div class="divide-y" id="usersList">
          ${users ? users.map(u => `
            <div class="flex items-center justify-between px-5 py-4">
              <div class="flex items-center gap-3">
                <div class="w-9 h-9 rounded-full ${u.role === 'admin' ? 'bg-purple-100' : 'bg-blue-100'} flex items-center justify-center font-bold text-sm ${u.role === 'admin' ? 'text-purple-600' : 'text-blue-600'}">
                  ${u.name.charAt(0)}
                </div>
                <div>
                  <div class="font-medium text-gray-800 text-sm">${u.name}</div>
                  <div class="text-xs text-gray-500">${formatDate(u.created_at)} 创建</div>
                </div>
              </div>
              <div class="flex items-center gap-3">
                <span class="px-2.5 py-1 rounded-full text-xs font-medium ${u.role === 'admin' ? 'bg-purple-100 text-purple-700' : 'bg-blue-100 text-blue-700'}">
                  ${u.role === 'admin' ? '管理员' : '编辑'}
                </span>
                ${u.id !== currentUser.id ? 
                  `<button onclick="deleteUser('${u.id}', '${u.name}')" class="text-red-400 hover:text-red-600 text-sm p-1 rounded hover:bg-red-50 transition-colors">
                    <i class="fa fa-trash"></i>
                  </button>` : 
                  '<span class="text-xs text-gray-400 italic">（当前用户）</span>'}
              </div>
            </div>`).join('') : '<div class="p-6 text-center text-gray-400">暂无用户数据</div>'}
        </div>
      </div>
    </div>
  `;

  // reset add user form
  document.getElementById('newUserName').value = '';
  document.getElementById('newUserRole').value = 'editor';
  document.getElementById('newUserPassword').value = '';
  document.getElementById('addUserError').classList.add('hidden');
}

async function addUser() {
  const name = document.getElementById('newUserName').value.trim();
  const role = document.getElementById('newUserRole').value;
  const password = document.getElementById('newUserPassword').value;
  const errEl = document.getElementById('addUserError');
  errEl.classList.add('hidden');

  if (!name || !password) {
    errEl.textContent = '请填写姓名和密码';
    errEl.classList.remove('hidden');
    return;
  }

  const { error } = await supabase.from('slice_users').insert({ name, role, password });

  if (error) {
    errEl.textContent = '添加失败：' + error.message;
    errEl.classList.remove('hidden');
    return;
  }

  showToast(`用户 "${name}" 添加成功`);
  closeModal('addUserModal');
  await loadAllUsers();
  renderSettings();
}

async function deleteUser(userId, userName) {
  if (!confirm(`确定要删除用户「${userName}」吗？此操作不可撤销。`)) return;

  const { error } = await supabase.from('slice_users').delete().eq('id', userId);

  if (error) { showToast('删除失败：' + error.message, 'error'); return; }

  showToast(`用户 "${userName}" 已删除`);
  await loadAllUsers();
  renderSettings();
}

// ============ KEYBOARD SHORTCUTS ============
document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && document.getElementById('loginPage').offsetParent !== null) {
    doLogin();
  }
  if (e.key === 'Escape') {
    ['taskDetailModal', 'submitOutputModal', 'reviewModal', 'addUserModal'].forEach(id => {
      closeModal(id);
    });
  }
});

// ============ START ============
init();
</script>
